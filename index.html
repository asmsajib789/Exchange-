<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Best Betting Sites Bangladesh</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0b1a2a,#06121f);
  color: white;
}

.container {
  padding: 15px;
}

/* Card Design */
.card {
  background: #112b44;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* Round Logo */
.card img {
  width: 110px;
  height: 110px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #00c853;
  padding: 5px;
  background: #fff;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.1);
}

/* Button */
.btn {
  display: inline-block;
  padding: 12px 22px;
  background: linear-gradient(45deg,#00c853,#00e676);
  color: white;
  text-decoration: none;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #00a844;
}

/* Heading */
h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 20px;
}
</style>

</head>
<body>

<div class="container">
  <h1>🔥 Best Betting Sites in Bangladesh 🔥</h1>

  <!-- Crickex -->
  <div class="card">
    <img src="crickex.jpg" alt="Crickex Logo">

  </div>

  <!-- Baji -->
  <div class="card">

  </div>

  <!-- MCW -->
  <div class="card">
    <img src="mcw.png" alt="MCW Logo">
    <h3>MCW</h3>
    <a href="#" class="btn">Join Now</a>
  </div>

  <!-- Jaya9 -->

</div>
